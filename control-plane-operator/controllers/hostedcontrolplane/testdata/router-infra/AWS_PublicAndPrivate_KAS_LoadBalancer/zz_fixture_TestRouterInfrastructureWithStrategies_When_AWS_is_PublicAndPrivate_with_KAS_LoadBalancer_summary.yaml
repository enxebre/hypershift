# Router Infrastructure Summary
# This file shows the decisions made for this ServicePublishingStrategy configuration
#
# Test Case: When AWS is PublicAndPrivate with KAS LoadBalancer
#

input:
  platform: AWS
  isPrivateHCP: true
  isPublicHCP: true
  servicePublishingStrategies:
    - service: APIServer
      type: LoadBalancer
    - service: OAuthServer
      type: Route
      hostname: oauth.example.com
    - service: Konnectivity
      type: Route
      hostname: konnectivity.example.com
    - service: Ignition
      type: Route
      hostname: ignition.example.com

decisions:
  labelHCPRoutes: false
  # LabelHCPRoutes determines if routes should be labeled for the HCP router.
  # True when: Private-only OR (Public with dedicated DNS for KAS via Route)

createdResources:
  services:
    - name: private-router
      type: LoadBalancer
      internal: true
  routes:
    - name: ignition-server
      host: ignition-server.apps.hcp.hypershift.local
      labeledForHCPRouter: true
      internal: true
    - name: konnectivity-server
      host: konnectivity-server.apps.hcp.hypershift.local
      labeledForHCPRouter: true
      internal: true
    - name: oauth
      host: oauth.example.com
      labeledForHCPRouter: false
    - name: oauth-internal
      host: oauth.apps.hcp.hypershift.local
      labeledForHCPRouter: true
      internal: true
